<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>不動産登記法カード</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ef;
      --accent:#2563eb;
      --shadow:0 18px 40px rgba(15,23,42,.12);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #eef4ff 0, transparent 28%),
        radial-gradient(circle at top right, #eefcf7 0, transparent 26%),
        var(--bg);
      overflow:hidden;
    }
    .page{
      position:relative;
      min-height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:28px 20px 34px;
    }
    .title{
      position:absolute;
      top:24px;
      left:50%;
      transform:translateX(-50%);
      margin:0;
      font-size:clamp(24px, 4vw, 36px);
      letter-spacing:.04em;
      text-align:center;
      font-weight:800;
    }
    .sub{
      position:absolute;
      top:72px;
      left:50%;
      transform:translateX(-50%);
      color:var(--muted);
      font-size:14px;
      text-align:center;
      white-space:nowrap;
    }

    .nav-zone{
      position:fixed;
      top:0;
      width:22vw;
      min-width:90px;
      height:100vh;
      z-index:1;
      cursor:pointer;
      user-select:none;
    }
    .nav-zone.left{left:0}
    .nav-zone.right{right:0}
    .nav-zone:hover::after{
      opacity:1;
    }
    .nav-zone::after{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      color:#94a3b8;
      font-size:36px;
      font-weight:700;
      opacity:.25;
      transition:opacity .2s ease;
    }
    .nav-zone.left::after{content:"‹"; left:18px;}
    .nav-zone.right::after{content:"›"; right:18px;}

    .card-wrap{
      position:relative;
      z-index:2;
      width:min(920px, 78vw);
      max-width:920px;
      perspective:1400px;
      margin-top:24px;
    }
    .counter{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      margin-bottom:12px;
    }
    .stage{
      position:relative;
      width:100%;
      min-height:220px;
    }
    .card{
      position:relative;
      width:100%;
      transform-style:preserve-3d;
      transition:transform .55s ease, height .25s ease;
      cursor:pointer;
    }
    .card.flipped{transform:rotateY(180deg)}
    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px 30px 26px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }
    .back{transform:rotateY(180deg)}

    .label{
      display:inline-flex;
      align-self:flex-start;
      margin-bottom:14px;
      padding:7px 12px;
      border-radius:999px;
      background:#eff6ff;
      color:var(--accent);
      font-size:13px;
      font-weight:700;
      letter-spacing:.03em;
    }
    .content{
      white-space:pre-wrap;
      line-height:1.85;
      font-size:clamp(19px, 2.15vw, 28px);
      font-weight:700;
      word-break:break-word;
    }
    .back .content{
      font-size:clamp(18px, 2vw, 25px);
      font-weight:600;
    }
    .hint{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }
    .measure{
      position:absolute;
      visibility:hidden;
      pointer-events:none;
      left:-99999px;
      top:0;
      width:100%;
    }
    .card-wrap.swiping .card{
      transition:none;
    }
    .card-wrap.swiping .card.dragging-next{
      transform:translateX(var(--swipe-x, 0px)) rotate(2deg);
    }
    .card-wrap.swiping .card.dragging-prev{
      transform:translateX(var(--swipe-x, 0px)) rotate(-2deg);
    }
    .card-wrap.swiping .card.flipped.dragging-next{
      transform:rotateY(180deg) translateX(calc(var(--swipe-x, 0px) * -1)) rotate(-2deg);
    }
    .card-wrap.swiping .card.flipped.dragging-prev{
      transform:rotateY(180deg) translateX(calc(var(--swipe-x, 0px) * -1)) rotate(2deg);
    }
    .footer-note{
      position:absolute;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      color:var(--muted);
      font-size:12px;
      text-align:center;
      width:min(92vw, 900px);
    }

    @media (max-width: 900px){
      .card-wrap{width:min(94vw, 920px)}
      .nav-zone{width:16vw; min-width:56px}
      .face{padding:22px 20px 20px}
      .sub{top:68px; white-space:normal; width:90vw}
    }
  </style>
</head>
<body>
  <div class="nav-zone left" id="prevZone" aria-label="前のカードへ"></div>
  <div class="nav-zone right" id="nextZone" aria-label="次のカードへ"></div>

  <main class="page">
    <h1 class="title" id="themeTitle">不動産登記法</h1>
    <div class="sub">カード中央をクリックで表裏切替 ／ 画面左で前へ ／ 画面右で次へ</div>

    <section class="card-wrap" aria-live="polite">
      <div class="counter" id="counter"></div>
      <div class="stage" id="stage">
        <article class="card" id="card" role="button" tabindex="0" aria-label="カードをめくる">
          <section class="face front">
            <div class="label">問題</div>
            <div class="content" id="frontText"></div>
            <div class="hint">クリックで裏面を表示</div>
          </section>
          <section class="face back">
            <div class="label">解答</div>
            <div class="content" id="backText"></div>
            <div class="hint">もう一度クリックで表面に戻る</div>
          </section>
        </article>

        <div class="measure face" id="measureFront">
          <div class="label">問題</div>
          <div class="content" id="measureFrontText"></div>
          <div class="hint">クリックで裏面を表示</div>
        </div>
        <div class="measure face" id="measureBack">
          <div class="label">解答</div>
          <div class="content" id="measureBackText"></div>
          <div class="hint">もう一度クリックで表面に戻る</div>
        </div>
      </div>
    </section>

    <div class="footer-note">← → キーでも移動できます。スペースキーまたは Enter キーでも表裏を切り替えできます。スマホでは左右スワイプでも移動できます。</div>
  </main>

  <script>
    const deck = {
      theme: "不動産登記法",
      cards: [
        {
          front: "登記識別情報の失効の申出及び登記識別情報の有効証明の請求は、いずれも電子申請によってすることができるか？",
          back: "できる"
        },
        {
          front: "住所証明情報とは？",
          back: "所有権の登記名義人となる者の住所を証する市区町村長、登記官その他の公務員が職務上作成した情報"
        },
        {
          front: "住所証明情報の提供が要求される３つの場合とは？",
          back: "①所有権の保存の登記の申請人\n②所有権〔持分〕の移転の登記の登記権利者\n③新たに登記名義人となる者がいる所有権の更正の登記の登記権利者"
        },
        {
          front: "仮登記とは何か？",
          back: "将来する本登記の順位を保全するためにされる登記"
        },
        {
          front: "共同申請が原則とされる代表例は？",
          back: "権利に関する登記のうち、登記権利者と登記義務者が共同して申請する場合"
        },
        {
          front: "登記事項証明書とは何か？",
          back: "登記記録に記録された事項を証明した書面又は電磁的記録の内容を証明するもの"
        },
        {
          front: "表題部には主として何が記録されるか？",
          back: "不動産の物理的現況に関する事項"
        },
        {
          front: "権利部甲区には何が記録されるか？",
          back: "所有権に関する事項"
        },
        {
          front: "権利部乙区には何が記録されるか？",
          back: "所有権以外の権利に関する事項"
        },
        {
          front: "登記申請における代理人の権限を証する情報とは何か？",
          back: "代理権限の存在を証明するために提供される委任状などの情報"
        }
      ]
    };

    const themeTitle = document.getElementById('themeTitle');
    const counter = document.getElementById('counter');
    const frontText = document.getElementById('frontText');
    const backText = document.getElementById('backText');
    const card = document.getElementById('card');
    const cardWrap = document.querySelector('.card-wrap');
    const stage = document.getElementById('stage');
    const measureFront = document.getElementById('measureFront');
    const measureBack = document.getElementById('measureBack');
    const measureFrontText = document.getElementById('measureFrontText');
    const measureBackText = document.getElementById('measureBackText');
    const prevZone = document.getElementById('prevZone');
    const nextZone = document.getElementById('nextZone');

    let index = 0;
    let flipped = false;

    themeTitle.textContent = deck.theme;

    function syncCardHeight(){
      const item = deck.cards[index];
      measureFrontText.textContent = item.front;
      measureBackText.textContent = item.back;

      const frontHeight = measureFront.offsetHeight;
      const backHeight = measureBack.offsetHeight;
      const nextHeight = Math.max(frontHeight, backHeight);

      stage.style.height = nextHeight + 'px';
      card.style.height = nextHeight + 'px';
    }

    function renderCard(){
      const item = deck.cards[index];
      frontText.textContent = item.front;
      backText.textContent = item.back;
      counter.textContent = `カード ${index + 1} / ${deck.cards.length}`;
      card.classList.toggle('flipped', flipped);
      card.setAttribute('aria-pressed', flipped ? 'true' : 'false');
      syncCardHeight();
    }

    function flipCard(){
      flipped = !flipped;
      renderCard();
    }

    function nextCard(){
      index = (index + 1) % deck.cards.length;
      flipped = false;
      renderCard();
    }

    function prevCard(){
      index = (index - 1 + deck.cards.length) % deck.cards.length;
      flipped = false;
      renderCard();
    }

    prevZone.addEventListener('click', prevCard);
    nextZone.addEventListener('click', nextCard);

    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        flipCard();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextCard();
      if (e.key === 'ArrowLeft') prevCard();
    });

    let touchStartX = 0;
    let touchStartY = 0;
    let touchCurrentX = 0;
    let isDragging = false;
    let swipeDirection = '';
    let moved = false;

    function clearSwipeState(){
      cardWrap.classList.remove('swiping');
      card.classList.remove('dragging-next', 'dragging-prev');
      card.style.removeProperty('--swipe-x');
      isDragging = false;
      swipeDirection = '';
    }

    card.addEventListener('touchstart', (e) => {
      if (!e.touches || e.touches.length !== 1) return;
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchCurrentX = t.clientX;
      moved = false;
      clearSwipeState();
    }, { passive: true });

    card.addEventListener('touchmove', (e) => {
      if (!e.touches || e.touches.length !== 1) return;
      const t = e.touches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;

      if (Math.abs(dx) > 10) moved = true;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 18) {
        isDragging = true;
        swipeDirection = dx < 0 ? 'next' : 'prev';
        cardWrap.classList.add('swiping');
        card.classList.toggle('dragging-next', swipeDirection === 'next');
        card.classList.toggle('dragging-prev', swipeDirection === 'prev');
        card.style.setProperty('--swipe-x', dx + 'px');
        touchCurrentX = t.clientX;
      }
    }, { passive: true });

    card.addEventListener('touchend', () => {
      const dx = touchCurrentX - touchStartX;
      if (isDragging && Math.abs(dx) > 70) {
        clearSwipeState();
        if (dx < 0) nextCard();
        else prevCard();
        return;
      }
      clearSwipeState();
    });

    card.addEventListener('click', () => {
      if (moved) {
        moved = false;
        return;
      }
      flipCard();
    });

    window.addEventListener('resize', syncCardHeight);

    renderCard();
  </script>
</body>
</html>
