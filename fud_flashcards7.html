<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>不動産登記法カード</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --panel-back:#f3f4f6;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ef;
      --accent:#2563eb;
      --shadow:0 18px 40px rgba(15,23,42,.12);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #eef4ff 0, transparent 28%),
        radial-gradient(circle at top right, #eefcf7 0, transparent 26%),
        var(--bg);
        overflow-y:auto;
        overflow-x:hidden;
      touch-action:pan-y;
      -webkit-overflow-scrolling: touch;
    }

    .page{
      position:relative;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:28px 20px 34px;
    }

    .title{
      margin:0;
      font-size:clamp(18px, 4vw, 22px);
      font-weight:800;
      position:absolute;
      left:50%;
      transform:translateX(-50%);
    }

    .tag-box-wrap{
      position:absolute;
      top:110px;
      left:50%;
      transform:translateX(-50%);
      width:min(92vw, 960px);
      z-index:3;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    .tag-box-label{
      font-size:13px;
      color:var(--muted);
      line-height:1.3;
    }

    .tag-listbox{
      width:min(520px, 92vw);
      height:108px;
      padding:8px 10px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#ffffff;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
      color:var(--text);
      font-size:14px;
    }

    .tag-listbox:focus{
      outline:none;
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(59,130,246,.12);
    }

    .nav-zone{
      position:fixed;
      top:88px;
      width:22vw;
      min-width:90px;
      height:calc(100vh - 88px);
      z-index:1;
      cursor:pointer;
      user-select:none;
    }
    .nav-zone.left{left:0}
    .nav-zone.right{right:0}
    .nav-zone:hover::after{opacity:1}
    .nav-zone::after{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      color:#94a3b8;
      font-size:18px;
      font-weight:700;
      opacity:.25;
      transition:opacity .2s ease;
    }
    .nav-zone.left::after{content:"‹"; left:18px;}
    .nav-zone.right::after{content:"›"; right:18px;}

    .card-wrap{
      position:relative;
      z-index:2;
      width:min(920px, 78vw);
      max-width:920px;
      perspective:1400px;
      margin-top:190px;
    }

    .counter{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      margin-bottom:12px;
      margin-top:12px;
    }

    .stage{
      position:relative;
      width:100%;
      min-height:240px;
      transition:height .22s ease;
    }

    .card-shell{
      position:relative;
      width:100%;
      overflow:hidden;
      border-radius:var(--radius);
    }

    .card-track{
      position:relative;
      width:100%;
      height:100%;
    }

    .card{
      position:absolute;
      inset:0;
      width:100%;
      transform-style:preserve-3d;
      cursor:pointer;
      transition:transform .5s cubic-bezier(.4,.2,.2,1);
      will-change:transform;
    }

    .card.is-flipped{
      transform:rotateY(180deg);
    }

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px 30px 26px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      overflow:hidden;
    }

    .front{background:#ffffff;}
    .back{
      transform:rotateY(180deg);
      background:var(--panel-back);
    }

    .label{
      display:inline-flex;
      align-self:flex-start;
      margin-bottom:14px;
      padding:7px 12px;
      border-radius:999px;
      background:#eff6ff;
      color:var(--accent);
      font-size:13px;
      font-weight:700;
      letter-spacing:.03em;
      flex:0 0 auto;
    }

    .card-body{
      display:flex;
      flex-direction:column;
      gap:16px;
      width:100%;
      flex:1 1 auto;
      min-height:0;
    }

    .text-wrap{
      width:100%;
      flex:0 0 auto;
    }

    .content{
      white-space:pre-wrap;
      line-height:1.85;
      font-size:clamp(14px, 2.15vw, 18px);
      font-weight:700;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .back .content{
      font-size:clamp(14px, 2vw, 18px);
      font-weight:600;
    }

    .media-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:10px;
      overflow:hidden;
      flex:0 0 auto;
    }

    .back .media-wrap{
      background:#eceff3;
    }

    .card-img{
      display:block;
      max-width:100%;
      width:auto;
      height:auto;
      max-height:320px;
      object-fit:contain;
      border-radius:10px;
    }

    .measure-layer{
      position:absolute;
      left:-99999px;
      top:0;
      width:min(920px, 78vw);
      max-width:920px;
      visibility:hidden;
      pointer-events:none;
    }

    .measure-box{
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:28px 30px 26px;
      box-shadow:none;
      display:block;
      overflow:visible;
    }

    .measure-box.front{background:#ffffff;}
    .measure-box.back{background:var(--panel-back);}

    .measure-card-body{
      display:flex;
      flex-direction:column;
      gap:16px;
      width:100%;
    }

    .measure-media-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:10px;
      overflow:hidden;
    }

    .measure-box.back .measure-media-wrap{
      background:#eceff3;
    }

    .measure-img{
      display:block;
      max-width:100%;
      width:auto;
      height:auto;
      max-height:320px;
      object-fit:contain;
      border-radius:10px;
    }

    .footer-note{
      position:absolute;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      color:var(--muted);
      font-size:12px;
      text-align:center;
      width:min(92vw, 900px);
    }

    .header-nav{
      position:absolute;
      right:0;
      z-index:11;
      display:flex;
      gap:12px;
    }
    
    .nav-link{
      font-size:13px;
      text-decoration:none;
      color:var(--text);
      background:#ffffff;
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:8px;
      transition:all .2s ease;
    }
    
    .nav-link:hover{
      background:#f1f5f9;
      border-color:#cbd5e1;
    }

    .header-bar{
      position:relative;
      z-index:10;
      width:min(92vw, 960px);
      margin:24px auto 0;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
    }

    @media (max-width: 900px){
      .card-wrap{
        width:min(94vw, 920px);
        margin-top:24px;
      }
    
      .measure-layer{
        width:min(94vw, 920px);
      }
    
      .nav-zone{
        top:110px;
        width:16vw;
        min-width:56px;
        height:calc(100vh - 110px);
      }
    
      .face,
      .measure-box{
        padding:22px 20px 20px;
      }
    
      .card-body,
      .measure-card-body{
        gap:12px;
      }
    
      .card-img,
      .measure-img{
        max-height:220px;
      }
    
      .header-bar{
        position:relative;
        z-index:10;
        width:min(94vw, 960px);
        margin:24px auto 0;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:flex-start;
        gap:8px;
        min-height:auto;
      }
    
      .header-nav{
        position:static;
        order:-1;
        z-index:auto;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:8px;
        width:100%;
      }
    
      .title{
        position:static;
        left:auto;
        transform:none;
        width:100%;
        margin:0;
        text-align:center;
      }
    
      .nav-link{
        font-size:12px;
        padding:5px 8px;
        white-space:nowrap;
      }
    
      .tag-box-wrap{
        position:static;
        top:auto;
        left:auto;
        transform:none;
        width:min(94vw, 520px);
        margin:12px auto 0;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:6px;
      }
    
      .tag-listbox{
        width:100%;
      }
    }
}
  </style>
</head>
<body>
  <div class="nav-zone left" id="prevZone" aria-label="前のカードへ"></div>
  <div class="nav-zone right" id="nextZone" aria-label="次のカードへ"></div>

  <main class="page">

    <div class="header-bar">
      <h1 class="title" id="themeTitle">不動産登記法</h1>
    </div>

    <div class="tag-box-wrap">
      <div class="tag-box-label">論点</div>
      <select id="tagListbox" class="tag-listbox" size="5"></select>
    </div>

    <section class="card-wrap" aria-live="polite">
      <div class="counter" id="counter"></div>
      <div class="stage" id="stage">
        <div class="card-shell" id="cardShell">
          <div class="card-track" id="cardTrack"></div>
        </div>
      </div>
    </section>

    <div class="measure-layer" aria-hidden="true">
      <div class="measure-box front" id="measureFront">
        <div class="label">問題</div>
        <div class="measure-card-body">
          <div class="text-wrap">
            <div class="content" id="measureFrontText"></div>
          </div>
          <div class="measure-media-wrap" id="measureFrontMediaWrap" hidden>
            <img id="measureFrontImg" class="measure-img" alt="">
          </div>
        </div>
      </div>

      <div class="measure-box back" id="measureBack">
        <div class="label">解答</div>
        <div class="measure-card-body">
          <div class="text-wrap">
            <div class="content" id="measureBackText"></div>
          </div>
          <div class="measure-media-wrap" id="measureBackMediaWrap" hidden>
            <img id="measureBackImg" class="measure-img" alt="">
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">← → キーでも移動できます。スマホでは左右スワイプでも移動できます。</div>
  </main>

  <script>

          front: "643．官庁から私人Ａへの所有権の移転の登記を官庁が嘱託でする場合の登記において、以下の①～④のうち、提供する必要のない添付情報はどれか？\n①登記原因証明情報\n②登記識別情報\n③印鑑証明書\n④住所証明情報",
          back: "②③",
          frontImg: "",
          backImg: ""
        },
        {
          tag: "嘱託による登記",
          front: "644．官庁又は公署が行う公売処分による所有権の移転の登記の嘱託は、電子情報処理組織を使用する方法によって行うことができるか？",
          back: "できる",
          frontImg: "",
          backImg: ""
        },
        {
          tag: "職権抹消・職権更正",
          front: "645．同一建物について二重に表題登記がされた場合において、いずれの登記記録にも権利の登記がされていないときは、前にされた表題登記が登記官の職権により抹消されるか？",
          back: "前にされた表題登記ではなく、後にされた表題登記が登記官の職権で抹消される。後にされた表題登記のほうが、登記記録を見た人も少なく、利害関係人が少ないと考えられるため",
          frontImg: "",
          backImg: ""
        },
        {
          tag: "職権抹消・職権更正",
          front: "646．確定前の根抵当権について、根抵当権者ＡからＢへの一部譲渡による根抵当権の一部移転の登記及び優先の定めの登記がされた後、根抵当権の一部移転の登記が抹消された場合、その優先の定めの登記は、登記官の職権により抹消されるか？",
          back: "抹消されない",
          frontImg: "",
          backImg: ""
        },
        {
          tag: "職権抹消・職権更正",
          front: "647．登記官は、登記に錯誤を発見し、その錯誤がその登記官の過誤によるものである場合は、登記の更正を行い、登記の更正を行った後で監督する法務局又は地方法務局の長に報告をする必要があるか？",
          back: "登記の更正を行った後で監督する法務局または地方法務局の長に報告をするのではなく、登記の更正を行う前に法務局または地方法務局の長の許可を得る必要がある",
          frontImg: "",
          backImg: ""
        },
        {
          tag: "職権抹消・職権更正",
          front: "648．登記官は、職権による登記の更正をした後、登記権利者及び登記義務者に対して、登記の更正をした旨を通知する必要があるか？",
          back: "通知する必要がある",
          frontImg: "",
          backImg: ""
        }      ]
    };

    const themeTitle = document.getElementById('themeTitle');
    const tagListbox = document.getElementById('tagListbox');
    const counter = document.getElementById('counter');
    const stage = document.getElementById('stage');
    const cardShell = document.getElementById('cardShell');
    const cardTrack = document.getElementById('cardTrack');
    const prevZone = document.getElementById('prevZone');
    const nextZone = document.getElementById('nextZone');

    const measureFront = document.getElementById('measureFront');
    const measureBack = document.getElementById('measureBack');
    const measureFrontText = document.getElementById('measureFrontText');
    const measureBackText = document.getElementById('measureBackText');
    const measureFrontMediaWrap = document.getElementById('measureFrontMediaWrap');
    const measureBackMediaWrap = document.getElementById('measureBackMediaWrap');
    const measureFrontImg = document.getElementById('measureFrontImg');
    const measureBackImg = document.getElementById('measureBackImg');

    themeTitle.textContent = deck.theme;

    let index = 0;
    let flipped = false;
    let currentCard = null;
    let isAnimating = false;

    let touchStartX = 0;
    let touchStartY = 0;
    let touchCurrentX = 0;
    let moved = false;
    let dragDX = 0;

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function buildTagListbox(){
      const uniqueTags = [];
      const seen = Object.create(null);

      for (let i = 0; i < deck.cards.length; i++) {
        const tag = deck.cards[i].tag || `カード${i + 1}`;
        if (!seen[tag]) {
          seen[tag] = true;
          uniqueTags.push(tag);
        }
      }

      tagListbox.innerHTML = uniqueTags.map(tag => {
        return `<option value="${escapeHtml(tag)}">${escapeHtml(tag)}</option>`;
      }).join("");

      tagListbox.addEventListener('change', () => {
        if (isAnimating) return;
        const selectedTag = tagListbox.value;
        if (!selectedTag) return;

        const firstIndex = deck.cards.findIndex(card => (card.tag || "") === selectedTag);
        if (firstIndex < 0 || firstIndex === index) return;

        jumpToCard(firstIndex);
      });
    }

    function syncTagListbox(){
      const currentTag = deck.cards[index].tag || "";
      for (let i = 0; i < tagListbox.options.length; i++) {
        if (tagListbox.options[i].value === currentTag) {
          tagListbox.selectedIndex = i;
          return;
        }
      }
      tagListbox.selectedIndex = -1;
    }

    function getCardHtml(item){
      return `
        <section class="face front">
          <div class="label">${escapeHtml(item.tag || "問題")}</div>
          <div class="card-body">
            <div class="text-wrap">
              <div class="content">${escapeHtml(item.front).replace(/\n/g, '<br>')}</div>
            </div>
            ${item.frontImg ? `
              <div class="media-wrap">
                <img src="${item.frontImg}" alt="" class="card-img">
              </div>
            ` : ``}
          </div>
        </section>

        <section class="face back">
          <div class="label">${escapeHtml(item.tag || "解答")}</div>
          <div class="card-body">
            <div class="text-wrap">
              <div class="content">${escapeHtml(item.back).replace(/\n/g, '<br>')}</div>
            </div>
            ${item.backImg ? `
              <div class="media-wrap">
                <img src="${item.backImg}" alt="" class="card-img">
              </div>
            ` : ``}
          </div>
        </section>
      `;
    }

    function updateMeasureBox(boxTextEl, mediaWrapEl, imgEl, text, imgPath){
      boxTextEl.textContent = text || "";

      if (imgPath) {
        mediaWrapEl.hidden = false;
        imgEl.src = imgPath;
      } else {
        mediaWrapEl.hidden = true;
        imgEl.removeAttribute('src');
      }
    }

    function waitForImageLoad(imgEl){
      return new Promise((resolve) => {
        if (!imgEl || !imgEl.getAttribute('src')) {
          resolve();
          return;
        }
        if (imgEl.complete) {
          resolve();
          return;
        }
        imgEl.onload = () => resolve();
        imgEl.onerror = () => resolve();
      });
    }

    async function measureHeight(targetIndex){
      const item = deck.cards[targetIndex];

      updateMeasureBox(measureFrontText, measureFrontMediaWrap, measureFrontImg, item.front, item.frontImg);
      updateMeasureBox(measureBackText, measureBackMediaWrap, measureBackImg, item.back, item.backImg);

      await Promise.all([
        waitForImageLoad(measureFrontImg),
        waitForImageLoad(measureBackImg)
      ]);

      const frontH = Math.ceil(measureFront.offsetHeight);
      const backH = Math.ceil(measureBack.offsetHeight);

      return Math.max(frontH, backH, 240);
    }

    async function applyHeight(targetIndex){
      const h = await measureHeight(targetIndex);
      stage.style.height = h + 'px';
      cardShell.style.height = h + 'px';
      cardTrack.style.height = h + 'px';
      if (currentCard) currentCard.style.height = h + 'px';
      return h;
    }

    function createCard(targetIndex, isFlipped = false){
      const card = document.createElement('article');
      card.className = 'card';
      if (isFlipped) card.classList.add('is-flipped');
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', 'カードをめくる');
      card.setAttribute('aria-pressed', isFlipped ? 'true' : 'false');
      card.innerHTML = getCardHtml(deck.cards[targetIndex]);
      bindCardEvents(card);
      return card;
    }

    function updateCounter(targetIndex = index){
      const tag = deck.cards[targetIndex].tag ? `｜${deck.cards[targetIndex].tag}` : "";
      counter.textContent = `カード ${targetIndex + 1} / ${deck.cards.length} ${tag}`;
    }

    async function renderInitial(){
      currentCard = createCard(index, flipped);
      cardTrack.innerHTML = '';
      cardTrack.appendChild(currentCard);
      await applyHeight(index);
      updateCounter(index);
      syncTagListbox();
    }

    async function setFlipState(nextFlipped){
      flipped = nextFlipped;
      if (!currentCard) return;

      currentCard.style.transition = '';
      currentCard.style.transform = '';

      currentCard.classList.toggle('is-flipped', flipped);
      currentCard.setAttribute('aria-pressed', flipped ? 'true' : 'false');
      await applyHeight(index);
    }

    async function flipCard(){
      if (isAnimating) return;
      if (currentCard) {
        currentCard.style.transition = '';
        currentCard.style.transform = '';
      }
      await setFlipState(!flipped);
    }

    async function goToCard(nextIndex, direction){
      if (isAnimating) return;
      isAnimating = true;

      const oldCard = currentCard;
      const newCard = createCard(nextIndex, false);
      cardTrack.appendChild(newCard);

      const newHeight = await applyHeight(nextIndex);
      newCard.style.height = newHeight + 'px';

      newCard.style.transition = 'none';
      oldCard.style.transition = 'none';

      newCard.style.transform = direction === 'next'
        ? 'translateX(100%)'
        : 'translateX(-100%)';

      oldCard.style.transform = flipped ? 'rotateY(180deg)' : 'translateX(0)';

      updateCounter(nextIndex);

      newCard.getBoundingClientRect();

      requestAnimationFrame(() => {
        oldCard.style.transition = 'transform .38s ease';
        newCard.style.transition = 'transform .38s ease';

        oldCard.style.transform = direction === 'next'
          ? (flipped ? 'translateX(-100%) rotateY(180deg)' : 'translateX(-100%)')
          : (flipped ? 'translateX(100%) rotateY(180deg)' : 'translateX(100%)');

        newCard.style.transform = 'translateX(0)';
      });

      setTimeout(async () => {
        oldCard.remove();
        currentCard = newCard;
        index = nextIndex;
        flipped = false;
        currentCard.classList.remove('is-flipped');
        currentCard.style.transition = '';
        currentCard.style.transform = '';
        currentCard.setAttribute('aria-pressed', 'false');
        await applyHeight(index);
        updateCounter(index);
        syncTagListbox();
        isAnimating = false;
      }, 420);
    }

    function jumpToCard(nextIndex){
      if (nextIndex === index) return;
      const direction = nextIndex > index ? 'next' : 'prev';
      goToCard(nextIndex, direction);
    }

    function nextCard(){
      goToCard((index + 1) % deck.cards.length, 'next');
    }

    function prevCard(){
      goToCard((index - 1 + deck.cards.length) % deck.cards.length, 'prev');
    }

    function resetDragVisual(){
      if (!currentCard) return;
      currentCard.style.transition = '';
      currentCard.style.transform = '';
      if (flipped) currentCard.classList.add('is-flipped');
      else currentCard.classList.remove('is-flipped');
      dragDX = 0;
    }

    function bindCardEvents(card){
      card.addEventListener('click', () => {
        if (moved || isAnimating) {
          moved = false;
          return;
        }
        flipCard();
      });

      card.addEventListener('keydown', (e) => {
        if (isAnimating) return;
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          flipCard();
        }
      });

      card.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1 || isAnimating) return;

        const t = e.touches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
        touchCurrentX = t.clientX;
        moved = false;
        dragDX = 0;

        if (currentCard) currentCard.style.transition = 'none';
      }, { passive: true });

      card.addEventListener('touchmove', (e) => {
        if (!e.touches || e.touches.length !== 1 || isAnimating) return;

        const t = e.touches[0];
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;

        if (Math.abs(dx) > 10) moved = true;

        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 18) {
          touchCurrentX = t.clientX;
          dragDX = dx;

          if (currentCard) {
            currentCard.style.transition = 'none';
            currentCard.style.transform = flipped
              ? `translateX(${dx}px) rotateY(180deg)`
              : `translateX(${dx}px)`;
          }
        }
      }, { passive: true });

      card.addEventListener('touchend', () => {
        if (isAnimating) return;

        const dx = touchCurrentX - touchStartX;

        if (Math.abs(dragDX) > 70) {
          resetDragVisual();
          if (dx < 0) nextCard();
          else prevCard();
          return;
        }

        resetDragVisual();
      });

      card.addEventListener('touchcancel', () => {
        resetDragVisual();
      });
    }

    prevZone.addEventListener('click', prevCard);
    nextZone.addEventListener('click', nextCard);

    document.addEventListener('keydown', (e) => {
      if (isAnimating) return;
      if (e.key === 'ArrowRight') nextCard();
      if (e.key === 'ArrowLeft') prevCard();
    });

    window.addEventListener('resize', () => {
      applyHeight(index);
    });

    buildTagListbox();
    renderInitial();
  </script></body>
