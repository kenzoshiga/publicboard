<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>民法カード</title>

<style>
:root{
  --bg:#f5f7fb;
  --panel:#ffffff;
  --panel-back:#f3f4f6;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#dbe3ef;
  --accent:#2563eb;
  --shadow:0 18px 40px rgba(15,23,42,.12);
  --radius:22px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, #eef4ff 0, transparent 28%),
    radial-gradient(circle at top right, #eefcf7 0, transparent 26%),
    var(--bg);
  overflow-y:auto;
  overflow-x:hidden;
  touch-action:pan-y;
  -webkit-overflow-scrolling:touch;
}

.page{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:20px 20px 34px;
}

/* ===== header ===== */
.header-bar{
  position:relative;
  width:min(92vw, 1100px);
  height:56px;
  margin:0 auto 8px;
}

.title{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  margin:0;
  font-size:clamp(16px, 4vw, 24px);
  letter-spacing:.04em;
  text-align:center;
  font-weight:800;
  white-space:nowrap;
}

.header-nav{
  position:absolute;
  right:0;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:10px;
  align-items:center;
}

.nav-link{
  text-decoration:none;
  color:var(--text);
  background:#fff;
  border:1px solid var(--line);
  padding:6px 10px;
  border-radius:8px;
  font-size:13px;
  transition:all .2s ease;
}
.nav-link:hover{
  background:#f8fbff;
  border-color:#c7d7f7;
}

/* ===== collapsible lists ===== */
.tag-box-wrap,
.bookmark-box-wrap{
  width:min(92vw, 960px);
  margin:0 auto 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.bookmark-box-wrap{
  margin-top:10px;
}

.section-toggle{
  width:min(520px, 92vw);
  text-align:left;
  padding:8px 12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#ffffff;
  color:var(--text);
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}

.section-toggle:hover{
  background:#f8fbff;
  border-color:#c7d7f7;
}

.tag-panel,
.bookmark-panel{
  width:min(520px, 92vw);
  max-height:160px;
  overflow-y:auto;
  overflow-x:hidden;
  border:1px solid var(--line);
  border-radius:14px;
  background:#ffffff;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  margin-top:6px;
  padding:4px 0;
}

.bookmark-panel{
  max-height:150px;
}

.tag-panel.is-collapsed,
.bookmark-panel.is-collapsed{
  display:none;
}

.list-item{
  display:block;
  width:100%;
  text-align:left;
  padding:6px 10px;
  border:0;
  background:#fff;
  color:var(--text);
  font-size:14px;
  line-height:1.25;
  cursor:pointer;
}

.list-item:hover{
  background:#f8fbff;
}

.list-item.active{
  background:#eff6ff;
  color:var(--accent);
  font-weight:700;
}

.list-item.empty{
  color:var(--muted);
  cursor:default;
}

/* ===== cards ===== */
.card-wrap{
  position:relative;
  z-index:2;
  width:min(980px, 92vw);
  max-width:980px;
  perspective:1400px;
  margin-top:36px;
}

.counter{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  margin-top:20px;
  margin-bottom:12px;
}

.stage{
  position:relative;
  width:100%;
  min-height:240px;
  transition:height .22s ease;
}

.card-shell{
  position:relative;
  width:100%;
  overflow:hidden;
  border-radius:var(--radius);
  z-index:2;
}

.card-track{
  position:relative;
  width:100%;
  height:100%;
}

.card{
  position:absolute;
  top:0;
  bottom:0;
  left:40px;
  right:40px;
  width:auto;
  transform-style:preserve-3d;
  cursor:pointer;
  transition:transform .5s cubic-bezier(.4,.2,.2,1);
  will-change:transform;
  z-index:3;
}

.card.is-flipped{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:24px 24px 16px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  overflow:auto;
}

.front{background:#ffffff;}
.back{
  transform:rotateY(180deg);
  background:var(--panel-back);
}

.card-topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.label{
  display:inline-flex;
  align-self:flex-start;
  padding:7px 12px;
  border-radius:999px;
  background:#eff6ff;
  color:var(--accent);
  font-size:13px;
  font-weight:700;
  letter-spacing:.03em;
  flex:0 0 auto;
}

.bookmark-btn{
  border:1px solid var(--line);
  background:#fff;
  color:#94a3b8;
  border-radius:10px;
  padding:6px 10px;
  font-size:16px;
  line-height:1;
  cursor:pointer;
  transition:all .2s ease;
  flex:0 0 auto;
  position:relative;
  z-index:5;
}

.bookmark-btn:hover{
  border-color:#cbd5e1;
  background:#f8fafc;
}

.bookmark-btn.active{
  color:#f59e0b;
  border-color:#f59e0b;
  background:#fff7e6;
}

.card-body{
  display:flex;
  flex-direction:column;
  gap:12px;
  width:100%;
  flex:1 1 auto;
  min-height:0;
}

.text-wrap{
  width:100%;
  flex:0 0 auto;
}

.content{
  white-space:pre-wrap;
  line-height:1.8;
  font-size:clamp(16px, 2.15vw, 20px);
  font-weight:700;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.back .content{
  font-size:clamp(16px, 2vw, 20px);
  font-weight:600;
}

.media-wrap{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:10px;
  overflow:hidden;
  flex:0 0 auto;
}

.back .media-wrap{
  background:#eceff3;
}

.card-img{
  display:block;
  max-width:100%;
  width:auto;
  height:auto;
  max-height:320px;
  object-fit:contain;
  border-radius:10px;
}

/* ===== memo ===== */
.memo-box{
  margin-top:10px;
  border:0;
  background:transparent;
  padding:0;
  width:100%;
  max-width:100%;
  position:relative;
  z-index:5;
}

.back .memo-box{
  display:none;
}

.memo-label{
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
}

.memo-input{
  display:block;
  width:100%;
  max-width:100%;
  min-height:72px;
  max-height:160px;
  resize:vertical;
  border:1px solid #cfd8e3;
  border-radius:10px;
  padding:8px 10px;
  font:inherit;
  font-size:14px;
  line-height:1.45;
  background:#fff;
  color:var(--text);
  position:relative;
  z-index:6;
}

.memo-actions{
  margin-top:6px;
  display:flex;
  justify-content:flex-end;
  gap:8px;
  align-items:center;
}

.memo-save-btn{
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  border-radius:10px;
  padding:7px 12px;
  font-size:13px;
  cursor:pointer;
  position:relative;
  z-index:6;
}

.memo-save-btn:hover{
  background:#f8fbff;
  border-color:#c7d7f7;
}

.memo-status{
  font-size:12px;
  color:var(--muted);
}

/* ===== measure ===== */
.measure-layer{
  position:absolute;
  left:-99999px;
  top:0;
  width:min(980px, 92vw);
  max-width:980px;
  visibility:hidden;
  pointer-events:none;
}

.measure-box{
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:24px 24px 16px;
  box-shadow:none;
  display:block;
  overflow:visible;
}

.measure-box.front{background:#ffffff;}
.measure-box.back{background:var(--panel-back);}

.measure-card-body{
  display:flex;
  flex-direction:column;
  gap:12px;
  width:100%;
}

.measure-topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.measure-media-wrap{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:10px;
  overflow:hidden;
}

.measure-box.back .measure-media-wrap{
  background:#eceff3;
}

.measure-img{
  display:block;
  max-width:100%;
  width:auto;
  height:auto;
  max-height:320px;
  object-fit:contain;
  border-radius:10px;
}

.measure-memo{
  border:0;
  background:transparent;
  padding:0;
}

.measure-memo-text{
  min-height:72px;
  max-height:160px;
  white-space:pre-wrap;
  line-height:1.45;
  border:1px solid #cfd8e3;
  border-radius:10px;
  padding:8px 10px;
  background:#fff;
}

/* ===== footer ===== */
.footer-note{
  margin-top:18px;
  color:var(--muted);
  font-size:12px;
  text-align:center;
  width:min(92vw, 900px);
}

@media (max-width: 900px){
  .card-wrap{width:min(94vw, 980px)}
  .measure-layer{width:min(94vw, 980px)}
  .face,.measure-box{padding:20px 16px 14px}
  .card-body,.measure-card-body{gap:10px}
  .card-img,.measure-img{max-height:220px}
  .header-bar{
    height:86px;
  }
  .title{
    top:18px;
    transform:translateX(-50%);
    font-size:clamp(22px, 6vw, 30px);
  }
  .header-nav{
    top:58px;
    right:0;
    transform:none;
    gap:6px;
  }
  .nav-link{
    padding:5px 8px;
    font-size:12px;
  }
  .card{
    left:24px;
    right:24px;
  }
}
</style>
</head>
<body>

<main class="page">
  <div class="header-bar">
    <h1 class="title" id="themeTitle">民法</h1>
    <div class="header-nav">
      <a href="#" class="nav-link" id="memoListLink">メモ一覧</a>
    </div>
  </div>

  <div class="tag-box-wrap">
    <button type="button" class="section-toggle" id="tagToggle">インデックス ▼</button>
    <div id="tagPanel" class="tag-panel is-collapsed" role="listbox" aria-label="インデックス"></div>
  </div>

  <div class="bookmark-box-wrap">
    <button type="button" class="section-toggle" id="bookmarkToggle">ブックマーク ▼</button>
    <div id="bookmarkPanel" class="bookmark-panel is-collapsed" role="listbox" aria-label="ブックマーク一覧"></div>
  </div>

  <section class="card-wrap" aria-live="polite">
    <div class="counter" id="counter"></div>

    <div class="stage" id="stage">
      <div class="card-shell" id="cardShell">
        <div class="card-track" id="cardTrack"></div>
      </div>
    </div>
  </section>

  <div class="measure-layer" aria-hidden="true">
    <div class="measure-box front" id="measureFront">
      <div class="measure-topbar">
        <div class="label">問題</div>
      </div>
      <div class="measure-card-body">
        <div class="text-wrap">
          <div class="content" id="measureFrontText"></div>
        </div>
        <div class="measure-media-wrap" id="measureFrontMediaWrap" hidden>
          <img id="measureFrontImg" class="measure-img" alt="">
        </div>
        <div class="measure-memo" id="measureFrontMemo">
          <div class="memo-label">メモ</div>
          <div class="measure-memo-text" id="measureFrontMemoText"></div>
          <div class="memo-actions">
            <span class="memo-status"></span>
            <button type="button" class="memo-save-btn">保存</button>
          </div>
        </div>
      </div>
    </div>

    <div class="measure-box back" id="measureBack">
      <div class="measure-topbar">
        <div class="label">解答</div>
      </div>
      <div class="measure-card-body">
        <div class="text-wrap">
          <div class="content" id="measureBackText"></div>
        </div>
        <div class="measure-media-wrap" id="measureBackMediaWrap" hidden>
          <img id="measureBackImg" class="measure-img" alt="">
        </div>
      </div>
    </div>
  </div>

  <div class="footer-note">← → キーでも移動できます。スマホでは左右スワイプでも移動できます。</div>
</main>

<script>

function escapeHtml(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function updateToggleLabel(){
  tagToggle.textContent = tagPanel.classList.contains('is-collapsed')
    ? 'インデックス ▼'
    : 'インデックス ▲';

  bookmarkToggle.textContent = bookmarkPanel.classList.contains('is-collapsed')
    ? 'ブックマーク ▼'
    : 'ブックマーク ▲';
}

tagToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  tagPanel.classList.toggle('is-collapsed');
  updateToggleLabel();
});

bookmarkToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  bookmarkPanel.classList.toggle('is-collapsed');
  updateToggleLabel();
});

/* ===== bookmarks ===== */
function loadBookmarks(){
  try{
    const raw = localStorage.getItem(BOOKMARK_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){
    return [];
  }
}

function saveBookmarks(ids){
  localStorage.setItem(BOOKMARK_KEY, JSON.stringify(ids));
}

function isBookmarked(cardId){
  return loadBookmarks().includes(cardId);
}

function toggleBookmark(cardId){
  const bookmarks = loadBookmarks();
  const idx = bookmarks.indexOf(cardId);

  if(idx >= 0){
    bookmarks.splice(idx, 1);
  }else{
    bookmarks.push(cardId);
  }

  saveBookmarks(bookmarks);
  updateBookmarkButton();
  buildBookmarkPanel();
}

function updateBookmarkButton(){
  const card = deck.cards[index];
  const buttons = document.querySelectorAll(".bookmark-btn");

  buttons.forEach(btn => {
    const active = isBookmarked(card.id);
    btn.classList.toggle("active", active);
    btn.textContent = active ? "★" : "☆";
    btn.title = active ? "ブックマーク解除" : "ブックマークする";
  });
}

function buildBookmarkPanel(){
  const bookmarks = loadBookmarks();
  const items = deck.cards.filter(card => bookmarks.includes(card.id));

  if(items.length === 0){
    bookmarkPanel.innerHTML = `<div class="list-item empty">ブックマークはまだありません</div>`;
    return;
  }

  bookmarkPanel.innerHTML = items.map(card => {
    const label = `${card.tag || ""}｜${card.front}`.slice(0, 60);
    return `
      <button type="button" class="list-item" data-card-id="${escapeHtml(card.id)}">
        ${escapeHtml(label)}
      </button>
    `;
  }).join("");

  bookmarkPanel.querySelectorAll(".list-item").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const cardId = btn.dataset.cardId;
      if(!cardId) return;
      openCardById(cardId);
      bookmarkPanel.classList.add('is-collapsed');
      updateToggleLabel();
    });
  });
}

/* ===== memos ===== */
function loadMemos(){
  try{
    const raw = localStorage.getItem(MEMO_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){
    return {};
  }
}

function saveMemos(obj){
  localStorage.setItem(MEMO_KEY, JSON.stringify(obj));
}

function getMemo(cardId){
  const memos = loadMemos();
  return memos[cardId] || "";
}

function saveMemo(cardId, text){
  const memos = loadMemos();
  memos[cardId] = text;
  saveMemos(memos);
}

function deleteMemo(cardId){
  const memos = loadMemos();
  delete memos[cardId];
  saveMemos(memos);
}

function refreshAfterMemoChange(changedCardId){
  if (deck.cards[index] && deck.cards[index].id === changedCardId) {
    renderCurrentCard();
  } else {
    buildBookmarkPanel();
  }
}

function saveMemoFromPopup(cardId, text){
  saveMemo(cardId, text);
  refreshAfterMemoChange(cardId);
}
window.saveMemoFromPopup = saveMemoFromPopup;

function deleteMemoFromPopup(cardId){
  deleteMemo(cardId);
  refreshAfterMemoChange(cardId);
}
window.deleteMemoFromPopup = deleteMemoFromPopup;

      <h1 style="margin-top:0;">メモ一覧</h1>
      ${rows || "<p>メモはまだありません。</p>"}
    </body>
    </html>
  `;

  const win = window.open("", "_blank", "width=900,height=700");
  if(!win) return;
  win.document.open();
  win.document.write(html);
  win.document.close();
}

memoListLink.addEventListener("click", (e) => {
  e.preventDefault();
  openMemoListWindow();
});

/* ===== tag panel ===== */
function buildTagPanel(){
  const uniqueTags = [];
  const seen = Object.create(null);

  for (let i = 0; i < deck.cards.length; i++) {
    const tag = deck.cards[i].tag || `カード${i + 1}`;
    if (!seen[tag]) {
      seen[tag] = true;
      uniqueTags.push(tag);
    }
  }

  tagPanel.innerHTML = uniqueTags.map(tag => {
    return `
      <button type="button" class="list-item" data-tag="${escapeHtml(tag)}">
        ${escapeHtml(tag)}
      </button>
    `;
  }).join("");

  tagPanel.querySelectorAll(".list-item").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isAnimating) return;
      const tag = btn.dataset.tag;
      const firstIndex = deck.cards.findIndex(card => (card.tag || "") === tag);
      if (firstIndex < 0) return;
      jumpToCard(firstIndex);
      tagPanel.classList.add('is-collapsed');
      updateToggleLabel();
    });
  });

  syncTagPanel();
}

function syncTagPanel(){
  const currentTag = deck.cards[index].tag || "";
  const buttons = tagPanel.querySelectorAll(".list-item");

  buttons.forEach(btn => {
    const active = btn.dataset.tag === currentTag;
    btn.classList.toggle("active", active);
    if (active) {
      btn.scrollIntoView({ block: "nearest" });
    }
  });
}

/* ===== cards ===== */
function getCardHtml(item){
  const memo = getMemo(item.id);

  return `
    <section class="face front">
      <div class="card-topbar">
        <div class="label">${escapeHtml(item.tag || "問題")}</div>
        <button type="button" class="bookmark-btn" data-card-id="${escapeHtml(item.id)}">☆</button>
      </div>
      <div class="card-body">
        <div class="text-wrap">
          <div class="content">${escapeHtml(item.front).replace(/\n/g, '<br>')}</div>
        </div>
        ${item.frontImg ? `
          <div class="media-wrap">
            <img src="${item.frontImg}" alt="" class="card-img">
          </div>
        ` : ``}
        <div class="memo-box">
          <div class="memo-label">メモ</div>
          <textarea class="memo-input" data-card-id="${escapeHtml(item.id)}">${escapeHtml(memo)}</textarea>
          <div class="memo-actions">
            <span class="memo-status" data-card-id="${escapeHtml(item.id)}"></span>
            <button type="button" class="memo-save-btn" data-card-id="${escapeHtml(item.id)}">保存</button>
          </div>
        </div>
      </div>
    </section>

    <section class="face back">
      <div class="card-topbar">
        <div class="label">${escapeHtml(item.tag || "解答")}</div>
        <button type="button" class="bookmark-btn" data-card-id="${escapeHtml(item.id)}">☆</button>
      </div>
      <div class="card-body">
        <div class="text-wrap">
          <div class="content">${escapeHtml(item.back).replace(/\n/g, '<br>')}</div>
        </div>
        ${item.backImg ? `
          <div class="media-wrap">
            <img src="${item.backImg}" alt="" class="card-img">
          </div>
        ` : ``}
      </div>
    </section>
  `;
}

function updateMeasureBox(boxTextEl, mediaWrapEl, imgEl, text, imgPath, memoTextEl, memo){
  boxTextEl.textContent = text || "";

  if (memoTextEl) {
    memoTextEl.textContent = memo || "";
  }

  if (imgPath) {
    mediaWrapEl.hidden = false;
    imgEl.src = imgPath;
  } else {
    mediaWrapEl.hidden = true;
    imgEl.removeAttribute('src');
  }
}

function waitForImageLoad(imgEl){
  return new Promise((resolve) => {
    if (!imgEl || !imgEl.getAttribute('src')) {
      resolve();
      return;
    }
    if (imgEl.complete) {
      resolve();
      return;
    }
    imgEl.onload = () => resolve();
    imgEl.onerror = () => resolve();
  });
}

async function measureHeight(targetIndex){
  const item = deck.cards[targetIndex];
  const memo = getMemo(item.id);

  updateMeasureBox(
    measureFrontText,
    measureFrontMediaWrap,
    measureFrontImg,
    item.front,
    item.frontImg,
    measureFrontMemoText,
    memo
  );

  updateMeasureBox(
    measureBackText,
    measureBackMediaWrap,
    measureBackImg,
    item.back,
    item.backImg,
    null,
    ""
  );

  await Promise.all([
    waitForImageLoad(measureFrontImg),
    waitForImageLoad(measureBackImg)
  ]);

  const frontH = Math.ceil(measureFront.offsetHeight);
  const backH = Math.ceil(measureBack.offsetHeight);

  return Math.max(frontH, backH, 240);
}

async function applyHeight(targetIndex){
  const h = await measureHeight(targetIndex);
  stage.style.height = h + 'px';
  cardTrack.style.height = h + 'px';
  if (currentCard) currentCard.style.height = h + 'px';
  return h;
}

function createCard(targetIndex, isFlipped = false){
  const card = document.createElement('article');
  card.className = 'card';
  if (isFlipped) card.classList.add('is-flipped');
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', 'カードをめくる');
  card.setAttribute('aria-pressed', isFlipped ? 'true' : 'false');
  card.innerHTML = getCardHtml(deck.cards[targetIndex]);
  bindCardEvents(card);
  return card;
}

function updateCounter(targetIndex = index){
  const tag = deck.cards[targetIndex].tag ? `｜${deck.cards[targetIndex].tag}` : "";
  counter.textContent = `カード ${targetIndex + 1} / ${deck.cards.length} ${tag}`;
}

async function renderCurrentCard(){
  currentCard = createCard(index, flipped);
  cardTrack.innerHTML = '';
  cardTrack.appendChild(currentCard);
  await applyHeight(index);
  updateCounter(index);
  syncTagPanel();
  updateBookmarkButton();
  buildBookmarkPanel();
}

async function renderInitial(){
  await renderCurrentCard();
}

async function setFlipState(nextFlipped){
  flipped = nextFlipped;
  if (!currentCard) return;

  currentCard.style.transition = '';
  currentCard.style.transform = '';

  currentCard.classList.toggle('is-flipped', flipped);
  currentCard.setAttribute('aria-pressed', flipped ? 'true' : 'false');
  await applyHeight(index);
  updateBookmarkButton();
}

async function flipCard(){
  if (isAnimating) return;
  if (currentCard) {
    currentCard.style.transition = '';
    currentCard.style.transform = '';
  }
  await setFlipState(!flipped);
}

async function goToCard(nextIndex, direction){
  if (isAnimating) return;
  isAnimating = true;

  const oldCard = currentCard;
  const newCard = createCard(nextIndex, false);
  cardTrack.appendChild(newCard);

  const newHeight = await applyHeight(nextIndex);
  newCard.style.height = newHeight + 'px';

  newCard.style.transition = 'none';
  oldCard.style.transition = 'none';

  newCard.style.transform = direction === 'next'
    ? 'translateX(100%)'
    : 'translateX(-100%)';

  oldCard.style.transform = flipped ? 'translateX(0) rotateY(180deg)' : 'translateX(0)';

  updateCounter(nextIndex);

  newCard.getBoundingClientRect();

  requestAnimationFrame(() => {
    oldCard.style.transition = 'transform .38s ease';
    newCard.style.transition = 'transform .38s ease';

    oldCard.style.transform = direction === 'next'
      ? (flipped ? 'translateX(-100%) rotateY(180deg)' : 'translateX(-100%)')
      : (flipped ? 'translateX(100%) rotateY(180deg)' : 'translateX(100%)');

    newCard.style.transform = 'translateX(0)';
  });

  setTimeout(async () => {
    oldCard.remove();
    currentCard = newCard;
    index = nextIndex;
    flipped = false;
    currentCard.classList.remove('is-flipped');
    currentCard.style.transition = '';
    currentCard.style.transform = '';
    currentCard.setAttribute('aria-pressed', 'false');
    await applyHeight(index);
    updateCounter(index);
    syncTagPanel();
    updateBookmarkButton();
    buildBookmarkPanel();
    isAnimating = false;
  }, 420);
}

function jumpToCard(nextIndex){
  if (nextIndex === index) return;
  const direction = nextIndex > index ? 'next' : 'prev';
  goToCard(nextIndex, direction);
}

function nextCard(){
  goToCard((index + 1) % deck.cards.length, 'next');
}

function prevCard(){
  goToCard((index - 1 + deck.cards.length) % deck.cards.length, 'prev');
}

function openCardById(cardId){
  const nextIndex = deck.cards.findIndex(card => card.id === cardId);
  if (nextIndex < 0) return;
  jumpToCard(nextIndex);
}
window.openCardById = openCardById;

function resetDragVisual(){
  if (!currentCard) return;
  currentCard.style.transition = '';
  currentCard.style.transform = '';
  if (flipped) currentCard.classList.add('is-flipped');
  else currentCard.classList.remove('is-flipped');
  dragDX = 0;
}

function showMemoSavedStatus(cardId){
  document.querySelectorAll(`.memo-status[data-card-id="${cardId}"]`).forEach(el => {
    el.textContent = "保存しました";
    setTimeout(() => {
      if (el.textContent === "保存しました") el.textContent = "";
    }, 1200);
  });
}

function bindCardEvents(card){
  card.querySelectorAll(".bookmark-btn").forEach(btn => {
    ["click","touchstart","touchend"].forEach(type => {
      btn.addEventListener(type, (e) => {
        e.stopPropagation();
        if (type === "click") {
          const cardId = btn.dataset.cardId;
          toggleBookmark(cardId);
        }
      }, { passive: type === "touchstart" });
    });
  });

  card.querySelectorAll(".memo-input").forEach(el => {
    ["click","touchstart","touchend","keydown"].forEach(type => {
      el.addEventListener(type, (e) => e.stopPropagation(), { passive: type === "touchstart" });
    });
  });

  card.querySelectorAll(".memo-save-btn").forEach(btn => {
    ["click","touchstart","touchend"].forEach(type => {
      btn.addEventListener(type, async (e) => {
        e.stopPropagation();
        if (type === "click") {
          const cardId = btn.dataset.cardId;
          const textarea = card.querySelector(`.memo-input[data-card-id="${cardId}"]`);
          if (!textarea) return;
          saveMemo(cardId, textarea.value);
          showMemoSavedStatus(cardId);
          await applyHeight(index);
        }
      }, { passive: type === "touchstart" });
    });
  });

  card.addEventListener('click', () => {
    if (moved || isAnimating) {
      moved = false;
      return;
    }
    flipCard();
  });

  card.addEventListener('keydown', (e) => {
    if (isAnimating) return;
    const active = document.activeElement;
    if (active && (active.classList.contains('memo-input') || active.classList.contains('memo-save-btn') || active.classList.contains('bookmark-btn'))) {
      return;
    }
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      flipCard();
    }
  });

  card.addEventListener('touchstart', (e) => {
    if (!e.touches || e.touches.length !== 1 || isAnimating) return;

    const target = e.target;
    if (target && (target.closest('.memo-box') || target.closest('.bookmark-btn'))) return;

    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchCurrentX = t.clientX;
    moved = false;
    dragDX = 0;

    if (currentCard) currentCard.style.transition = 'none';
  }, { passive: true });

  card.addEventListener('touchmove', (e) => {
    if (!e.touches || e.touches.length !== 1 || isAnimating) return;

    const target = e.target;
    if (target && (target.closest('.memo-box') || target.closest('.bookmark-btn'))) return;

    const t = e.touches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;

    if (Math.abs(dx) > 10) moved = true;

    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 18) {
      touchCurrentX = t.clientX;
      dragDX = dx;

      if (currentCard) {
        currentCard.style.transition = 'none';
        currentCard.style.transform = flipped
          ? `translateX(${dx}px) rotateY(180deg)`
          : `translateX(${dx}px)`;
      }
    }
  }, { passive: true });

  card.addEventListener('touchend', () => {
    if (isAnimating) return;

    const dx = touchCurrentX - touchStartX;

    if (Math.abs(dragDX) > 70) {
      resetDragVisual();
      if (dx < 0) nextCard();
      else prevCard();
      return;
    }

    resetDragVisual();
  });

  card.addEventListener('touchcancel', () => {
    resetDragVisual();
  });
}

/* カード外側余白クリックで前後移動 */
stage.addEventListener('click', (e) => {
  if (isAnimating) return;
  if (e.target.closest('.card')) return;

  const rect = stage.getBoundingClientRect();
  const x = e.clientX - rect.left;

  if (x < rect.width / 2) prevCard();
  else nextCard();
});

document.addEventListener('keydown', (e) => {
  if (isAnimating) return;
  const active = document.activeElement;
  if (active && (active.classList.contains('memo-input') || active.tagName === 'TEXTAREA')) return;

  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
});

window.addEventListener('resize', () => {
  applyHeight(index);
});

buildTagPanel();
buildBookmarkPanel();
updateToggleLabel();
renderInitial();
</script>
