<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>カード型学習ツール</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;
  background:#f5f7fb;
  padding:32px 16px;
}
.card{
  max-width:720px;
  margin:auto;
  background:#fff;
  border:1px solid #ddd;
  border-radius:16px;
  padding:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
  overflow:hidden;
}
.title{
  font-size:1.6rem;
  margin:0 0 10px;
}
.desc{
  margin:0 0 20px;
  line-height:1.8;
  overflow-wrap:anywhere;
}
.tags{
  display:flex;
  gap:10px;
  margin-bottom:16px;
  flex-wrap:wrap;
}
.tag-btn{
  border:1px solid #ccc;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  background:#fff;
  font:inherit;
}
.tag-btn.active{
  background:#e8f0ff;
  font-weight:bold;
}
.tag-panel{
  border:1px solid #cfe0ff;
  background:#f7fbff;
  padding:16px;
  border-radius:10px;
  overflow:hidden;
}
.tag-label{
  font-weight:bold;
  margin-bottom:8px;
}
.tag-content{
  overflow-wrap:anywhere;
}
.tag-content p{
  margin:6px 0;
  line-height:1.8;
}
.tag-content ul{
  margin:8px 0 8px 1.2em;
  padding:0;
}
.form-box{
  display:none;
  margin-top:14px;
  padding:14px;
  border:1px solid #d8e2f5;
  background:#fff;
  border-radius:10px;
  width:100%;
  max-width:100%;
}
.form-box.active{
  display:block;
}
.form-label{
  display:block;
  font-weight:700;
  margin-bottom:8px;
}
.form-row{
  display:flex;
  gap:10px;
  align-items:flex-start;
  width:100%;
}
.textarea{
  flex:1 1 auto;
  width:100%;
  min-width:0;
  min-height:140px;
  resize:vertical;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  font:inherit;
  line-height:1.7;
  background:#fff;
}
.copy-btn{
  flex:0 0 auto;
  padding:12px 14px;
  border:1px solid #bfd3ff;
  border-radius:10px;
  background:#eaf2ff;
  color:#1d4ed8;
  cursor:pointer;
  font:inherit;
  font-weight:700;
  white-space:nowrap;
}
.copy-btn:hover{
  filter:brightness(.98);
}
.copy-status{
  margin-top:8px;
  color:#64748b;
  font-size:.92rem;
  min-height:1.4em;
}
.note{
  margin-top:8px;
  color:#64748b;
  font-size:.92rem;
}
@media (max-width:640px){
  .card{padding:18px}
  .form-row{
    flex-direction:column;
  }
  .copy-btn{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="card">
  <div class="title">不動産物権変動</div>

  <div class="desc" id="desc"></div>

  <div class="tags">
    <button class="tag-btn active"
      data-label="重要概念"
      data-mode="content"
      data-content="**対抗要件:** 既に成立している権利変動を第三者に主張するために必要な要件。不動産については登記（民法177条）。<br>**意思主義:** 物権変動は当事者の意思表示のみで効力を生じるという原則。日本民法が採用。<br>**公示の原則:** 物権変動を外部から認識可能にすることで、取引の安全を図る原則。<br>**第三者:** 当事者およびその包括承継人以外の者で、登記の欠缺を主張する正当な利益を有する者。<br>**二重譲渡:** 同一の不動産を複数の者に譲渡すること。先に登記を備えた者が優先する。">
      重要概念
    </button>

    <button class="tag-btn"
      data-label="学習のポイント"
      data-mode="content"
      data-content="**意思主義と対抗要件の関係:** 当事者間では契約のみで物権変動が生じるが、第三者対抗には登記が必要という二段階構造を理解する。<br>**第三者の範囲:** 単に登記がないことを知っているだけでは第三者から除外されない。正当な利益の有無が重要。<br>**二重譲渡の処理:** 契約の先後ではなく、登記の先後で優劣が決まることを確実に押さえる。<br>**具体的事例への適用:** 転得者、抵当権者、差押債権者など、様々な第三者との関係で対抗要件の要否を判断できるようにする。">
      学習のポイント
    </button>

    <button class="tag-btn"
      data-label="問題演習"
      data-mode="form"
      data-content="**設問:** 民法177条の「第三者」の要件を示せ。">
      問題演習
    </button>
  </div>

  <div class="tag-panel">
    <div class="tag-label" id="label">重要概念</div>
    <div class="tag-content" id="content"></div>

    <div class="form-box" id="formBox">
      <label class="form-label" for="memoInput">入力フォーム</label>
      <div class="form-row">
        <textarea id="memoInput" class="textarea" placeholder="ここに自由に入力できます。"></textarea>
        <button type="button" id="copyBtn" class="copy-btn">コピー</button>
      </div>
      <div class="copy-status" id="copyStatus"></div>
      <div class="note">重要判例を選択している間、このフォームがカード内に表示されます。</div>
    </div>
  </div>
</div>

<script>
const descMarkdown = `不動産の物権変動は、当事者間では意思表示のみで効力を生じますが、第三者に対抗するには登記が必要です。ここでは、対抗要件制度の趣旨と具体的な適用について学びます。
`;

document.getElementById('desc').innerHTML = marked.parse(descMarkdown);

const buttons = document.querySelectorAll('.tag-btn');
const label = document.getElementById('label');
const content = document.getElementById('content');
const formBox = document.getElementById('formBox');
const memoInput = document.getElementById('memoInput');
const copyBtn = document.getElementById('copyBtn');
const copyStatus = document.getElementById('copyStatus');

function renderTab(btn){
  buttons.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  label.textContent = btn.dataset.label;
  content.innerHTML = marked.parse(btn.dataset.content);

  if(btn.dataset.mode === 'form'){
    formBox.classList.add('active');
  }else{
    formBox.classList.remove('active');
    copyStatus.textContent = '';
  }
}

async function copyText(){
  const text = memoInput.value;
  try{
    await navigator.clipboard.writeText(text);
    copyStatus.textContent = 'コピーしました。';
  }catch(e){
    memoInput.select();
    document.execCommand('copy');
    copyStatus.textContent = 'コピーしました。';
  }
}

copyBtn.addEventListener('click', copyText);

renderTab(buttons[0]);

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    renderTab(btn);
  });
});
</script>

</body>
</html>
