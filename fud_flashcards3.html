<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>不動産登記法カード</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --panel-back:#f3f4f6;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ef;
      --accent:#2563eb;
      --shadow:0 18px 40px rgba(15,23,42,.12);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #eef4ff 0, transparent 28%),
        radial-gradient(circle at top right, #eefcf7 0, transparent 26%),
        var(--bg);
      overflow:hidden;
      touch-action:pan-y;
    }

    .page{
      position:relative;
      min-height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:28px 20px 34px;
    }

    .title{
      position:absolute;
      top:24px;
      left:50%;
      transform:translateX(-50%);
      margin:0;
      font-size:clamp(24px, 4vw, 36px);
      letter-spacing:.04em;
      text-align:center;
      font-weight:800;
    }

    .sub{
      position:absolute;
      top:72px;
      left:50%;
      transform:translateX(-50%);
      color:var(--muted);
      font-size:14px;
      text-align:center;
      white-space:nowrap;
    }

    .nav-zone{
      position:fixed;
      top:0;
      width:22vw;
      min-width:90px;
      height:100vh;
      z-index:1;
      cursor:pointer;
      user-select:none;
    }
    .nav-zone.left{left:0}
    .nav-zone.right{right:0}
    .nav-zone:hover::after{opacity:1}
    .nav-zone::after{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      color:#94a3b8;
      font-size:18px;
      font-weight:700;
      opacity:.25;
      transition:opacity .2s ease;
    }
    .nav-zone.left::after{content:"‹"; left:18px;}
    .nav-zone.right::after{content:"›"; right:18px;}

    .card-wrap{
      position:relative;
      z-index:2;
      width:min(920px, 78vw);
      max-width:920px;
      perspective:1400px;
      margin-top:24px;
    }

    .counter{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      margin-bottom:12px;
    }

    .stage{
      position:relative;
      width:100%;
      min-height:240px;
      transition:height .22s ease;
    }

    .card-shell{
      position:relative;
      width:100%;
      overflow:hidden;
      border-radius:var(--radius);
    }

    .card-track{
      position:relative;
      width:100%;
      height:100%;
    }

    .card{
      position:absolute;
      inset:0;
      width:100%;
      transform-style:preserve-3d;
      cursor:pointer;
      transition:transform .5s cubic-bezier(.4,.2,.2,1);
      will-change:transform;
    }

    .card.is-flipped{
      transform:rotateY(180deg);
    }

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px 30px 26px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      overflow:hidden;
    }

    .front{background:#ffffff;}
    .back{
      transform:rotateY(180deg);
      background:var(--panel-back);
    }

    .label{
      display:inline-flex;
      align-self:flex-start;
      margin-bottom:14px;
      padding:7px 12px;
      border-radius:999px;
      background:#eff6ff;
      color:var(--accent);
      font-size:13px;
      font-weight:700;
      letter-spacing:.03em;
      flex:0 0 auto;
    }

    .card-body{
      display:flex;
      flex-direction:column;
      gap:16px;
      width:100%;
      flex:1 1 auto;
      min-height:0;
    }
    .text-wrap{
      width:100%;
      flex:0 0 auto;
    }

    .content{
      white-space:pre-wrap;
      line-height:1.85;
      font-size:clamp(14px, 2.15vw, 18px);
      font-weight:700;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .back .content{
      font-size:clamp(14px, 2vw, 18px);
      font-weight:600;
    }

    .hint{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }

    .media-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:10px;
      overflow:hidden;
      flex:0 0 auto;
    }

    .back .media-wrap{
      background:#ffffff;
    }

    .card-img{
      display:block;
      max-width:100%;
      width:auto;
      height:auto;
      max-height:320px;
      object-fit:contain;
      border-radius:10px;
    }

    .measure-layer{
      position:absolute;
      left:-99999px;
      top:0;
      width:min(920px, 78vw);
      max-width:920px;
      visibility:hidden;
      pointer-events:none;
    }

    .measure-box{
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:28px 30px 26px;
      box-shadow:none;
      display:block;
      overflow:visible;
    }

    .measure-box.front{background:#ffffff;}
    .measure-box.back{background:var(--panel-back);}

    .measure-card-body{
      display:flex;
      flex-direction:column;
      gap:16px;
      width:100%;
    }

    .measure-media-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#ffffff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:10px;
      overflow:hidden;
    }

    .measure-box.back .measure-media-wrap{
      background:#eceff3;
    }

    .measure-img{
      display:block;
      max-width:100%;
      width:auto;
      height:auto;
      max-height:320px;
      object-fit:contain;
      border-radius:10px;
    }

    .footer-note{
      position:absolute;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      color:var(--muted);
      font-size:12px;
      text-align:center;
      width:min(92vw, 900px);
    }

    @media (max-width: 900px){
      .card-wrap{width:min(94vw, 920px)}
      .measure-layer{width:min(94vw, 920px)}
      .nav-zone{width:16vw; min-width:56px}
      .face,.measure-box{padding:22px 20px 20px}
      .card-body,.measure-card-body{gap:12px}
      .card-img,.measure-img{max-height:220px}
      .sub{top:68px; white-space:normal; width:90vw}
    }
  </style>
</head>
<body>
  <div class="nav-zone left" id="prevZone" aria-label="前のカードへ"></div>
  <div class="nav-zone right" id="nextZone" aria-label="次のカードへ"></div>

  <main class="page">
    <h1 class="title" id="themeTitle">不動産登記法</h1>
    <div class="sub">カード中央をクリックで表裏切替 ／ 画面左で前へ ／ 画面右で次へ</div>

    <section class="card-wrap" aria-live="polite">
      <div class="counter" id="counter"></div>
      <div class="stage" id="stage">
        <div class="card-shell" id="cardShell">
          <div class="card-track" id="cardTrack"></div>
        </div>
      </div>
    </section>

    <div class="measure-layer" aria-hidden="true">
      <div class="measure-box front" id="measureFront">
        <div class="label">問題</div>
        <div class="measure-card-body">
          <div class="text-wrap">
            <div class="content" id="measureFrontText"></div>
          </div>
          <div class="measure-media-wrap" id="measureFrontMediaWrap" hidden>
            <img id="measureFrontImg" class="measure-img" alt="">
          </div>
        </div>
      </div>

      <div class="measure-box back" id="measureBack">
        <div class="label">解答</div>
        <div class="measure-card-body">
          <div class="text-wrap">
            <div class="content" id="measureBackText"></div>
          </div>
          <div class="measure-media-wrap" id="measureBackMediaWrap" hidden>
            <img id="measureBackImg" class="measure-img" alt="">
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">← → キーでも移動できます。スマホでは左右スワイプでも移動できます。</div>
  </main>

  <script>
    const deck = {
      theme: "不動産登記法",
      cards: [
        {
          front: "以下の①②のうち、第１欄の登記の目的及び第２欄の登記原因及びその日付を申請情報に記載した場合、登記できないものは？",
          back: "①。登記の目的は「◯番根抵当権移転」、登記原因及びその日付は「年月日譲渡」となる。登記の目的は「権利が　こう変動しました」、原因は「権利変動の効力発生日　これが権利変動が発生した原因です」という意味で記載する。「移転」したから「譲渡」したのではなく、「譲渡」〔原因〕したから「移転」〔変動〕したのである",
          frontImg: "q387.png",
          backImg: ""
        },
        {
          front: "住所証明情報とは？",
          back: "所有権の登記名義人となる者の住所を証する市区町村長、登記官その他の公務員が職務上作成した情報",
          frontImg: "",
          backImg: ""
        },
        {
          front: "住所証明情報の提供が要求される３つの場合とは？",
          back: "①所有権の保存の登記の申請人\n②所有権〔持分〕の移転の登記の登記権利者\n③新たに登記名義人となる者がいる所有権の更正の登記の登記権利者",
          frontImg: "",
          backImg: ""
        },
        {
          front: "仮登記とは何か？",
          back: "将来する本登記の順位を保全するためにされる登記",
          frontImg: "",
          backImg: ""
        },
        {
          front: "共同申請が原則とされる代表例は？",
          back: "権利に関する登記のうち、登記権利者と登記義務者が共同して申請する場合",
          frontImg: "",
          backImg: ""
        },
        {
          front: "登記事項証明書とは何か？",
          back: "登記記録に記録された事項を証明した書面又は電磁的記録の内容を証明するもの",
          frontImg: "",
          backImg: ""
        },
        {
          front: "表題部には主として何が記録されるか？",
          back: "不動産の物理的現況に関する事項",
          frontImg: "",
          backImg: ""
        },
        {
          front: "権利部甲区には何が記録されるか？",
          back: "所有権に関する事項",
          frontImg: "",
          backImg: ""
        },
        {
          front: "権利部乙区には何が記録されるか？",
          back: "所有権以外の権利に関する事項",
          frontImg: "",
          backImg: ""
        },
        {
          front: "登記申請における代理人の権限を証する情報とは何か？",
          back: "代理権限の存在を証明するために提供される委任状などの情報",
          frontImg: "",
          backImg: ""
        }
      ]
    };

    const themeTitle = document.getElementById('themeTitle');
    const counter = document.getElementById('counter');
    const stage = document.getElementById('stage');
    const cardShell = document.getElementById('cardShell');
    const cardTrack = document.getElementById('cardTrack');
    const prevZone = document.getElementById('prevZone');
    const nextZone = document.getElementById('nextZone');

    const measureFront = document.getElementById('measureFront');
    const measureBack = document.getElementById('measureBack');
    const measureFrontText = document.getElementById('measureFrontText');
    const measureBackText = document.getElementById('measureBackText');
    const measureFrontMediaWrap = document.getElementById('measureFrontMediaWrap');
    const measureBackMediaWrap = document.getElementById('measureBackMediaWrap');
    const measureFrontImg = document.getElementById('measureFrontImg');
    const measureBackImg = document.getElementById('measureBackImg');

    themeTitle.textContent = deck.theme;

    let index = 0;
    let flipped = false;
    let currentCard = null;
    let isAnimating = false;

    let touchStartX = 0;
    let touchStartY = 0;
    let touchCurrentX = 0;
    let moved = false;
    let dragDX = 0;

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getCardHtml(item){
      return `
        <section class="face front">
          <div class="label">問題</div>
          <div class="card-body">
            <div class="text-wrap">
              <div class="content">${escapeHtml(item.front).replace(/\n/g, '<br>')}</div>
            </div>
            ${item.frontImg ? `
              <div class="media-wrap">
                <img src="${item.frontImg}" alt="" class="card-img">
              </div>
            ` : ``}
          </div>
        </section>

        <section class="face back">
          <div class="label">解答</div>
          <div class="card-body">
            <div class="text-wrap">
              <div class="content">${escapeHtml(item.back).replace(/\n/g, '<br>')}</div>
            </div>
            ${item.backImg ? `
              <div class="media-wrap">
                <img src="${item.backImg}" alt="" class="card-img">
              </div>
            ` : ``}
          </div>
        </section>
      `;
    }

    function updateMeasureBox(boxTextEl, mediaWrapEl, imgEl, text, imgPath){
      boxTextEl.textContent = text || "";

      if (imgPath) {
        mediaWrapEl.hidden = false;
        imgEl.src = imgPath;
      } else {
        mediaWrapEl.hidden = true;
        imgEl.removeAttribute('src');
      }
    }

    function waitForImageLoad(imgEl){
      return new Promise((resolve) => {
        if (!imgEl || !imgEl.getAttribute('src')) {
          resolve();
          return;
        }
        if (imgEl.complete) {
          resolve();
          return;
        }
        imgEl.onload = () => resolve();
        imgEl.onerror = () => resolve();
      });
    }

    async function measureHeight(targetIndex){
      const item = deck.cards[targetIndex];

      updateMeasureBox(measureFrontText, measureFrontMediaWrap, measureFrontImg, item.front, item.frontImg);
      updateMeasureBox(measureBackText, measureBackMediaWrap, measureBackImg, item.back, item.backImg);

      await Promise.all([
        waitForImageLoad(measureFrontImg),
        waitForImageLoad(measureBackImg)
      ]);

      const frontH = Math.ceil(measureFront.offsetHeight);
      const backH = Math.ceil(measureBack.offsetHeight);

      return Math.max(frontH, backH, 320);
    }

    async function applyHeight(targetIndex){
      const h = await measureHeight(targetIndex);
      stage.style.height = h + 'px';
      cardShell.style.height = h + 'px';
      cardTrack.style.height = h + 'px';
      if (currentCard) currentCard.style.height = h + 'px';
      return h;
    }

    function createCard(targetIndex, isFlipped = false){
      const card = document.createElement('article');
      card.className = 'card';
      if (isFlipped) card.classList.add('is-flipped');
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', 'カードをめくる');
      card.setAttribute('aria-pressed', isFlipped ? 'true' : 'false');
      card.innerHTML = getCardHtml(deck.cards[targetIndex]);
      bindCardEvents(card);
      return card;
    }

    function updateCounter(targetIndex = index){
      counter.textContent = `カード ${targetIndex + 1} / ${deck.cards.length}`;
    }

    async function renderInitial(){
      currentCard = createCard(index, flipped);
      cardTrack.innerHTML = '';
      cardTrack.appendChild(currentCard);
      await applyHeight(index);
      updateCounter(index);
    }

    async function setFlipState(nextFlipped){
      flipped = nextFlipped;
      if (!currentCard) return;

      currentCard.style.transition = '';
      currentCard.style.transform = '';

      currentCard.classList.toggle('is-flipped', flipped);
      currentCard.setAttribute('aria-pressed', flipped ? 'true' : 'false');
      await applyHeight(index);
    }

    async function flipCard(){
      if (isAnimating) return;
      if (currentCard) {
        currentCard.style.transition = '';
        currentCard.style.transform = '';
      }
      await setFlipState(!flipped);
    }

    async function goToCard(nextIndex, direction){
      if (isAnimating) return;
      isAnimating = true;

      const oldCard = currentCard;
      const newCard = createCard(nextIndex, false);
      cardTrack.appendChild(newCard);

      const newHeight = await applyHeight(nextIndex);
      newCard.style.height = newHeight + 'px';

      /* 開始位置を明示 */
      newCard.style.transition = 'none';
      oldCard.style.transition = 'none';

      newCard.style.transform = direction === 'next'
        ? 'translateX(100%)'
        : 'translateX(-100%)';

      oldCard.style.transform = flipped ? 'rotateY(180deg)' : 'translateX(0)';

      updateCounter(nextIndex);

      /* 強制再描画 */
      newCard.getBoundingClientRect();

      requestAnimationFrame(() => {
        oldCard.style.transition = 'transform .38s ease';
        newCard.style.transition = 'transform .38s ease';

        oldCard.style.transform = direction === 'next'
          ? (flipped ? 'translateX(-100%) rotateY(180deg)' : 'translateX(-100%)')
          : (flipped ? 'translateX(100%) rotateY(180deg)' : 'translateX(100%)');

        newCard.style.transform = 'translateX(0)';
      });

      setTimeout(async () => {
        oldCard.remove();
        currentCard = newCard;
        index = nextIndex;
        flipped = false;
        currentCard.classList.remove('is-flipped');
        currentCard.style.transition = '';
        currentCard.style.transform = '';
        currentCard.setAttribute('aria-pressed', 'false');
        await applyHeight(index);
        updateCounter(index);
        isAnimating = false;
      }, 420);
    }

    function nextCard(){
      goToCard((index + 1) % deck.cards.length, 'next');
    }

    function prevCard(){
      goToCard((index - 1 + deck.cards.length) % deck.cards.length, 'prev');
    }

    function resetDragVisual(){
      if (!currentCard) return;
      currentCard.style.transition = '';
      currentCard.style.transform = '';
      if (flipped) {
        currentCard.classList.add('is-flipped');
      } else {
        currentCard.classList.remove('is-flipped');
      }
      dragDX = 0;
    }

    function bindCardEvents(card){
      card.addEventListener('click', () => {
        if (moved || isAnimating) {
          moved = false;
          return;
        }
        flipCard();
      });

      card.addEventListener('keydown', (e) => {
        if (isAnimating) return;
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          flipCard();
        }
      });

      card.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1 || isAnimating) return;

        const t = e.touches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
        touchCurrentX = t.clientX;
        moved = false;
        dragDX = 0;

        if (currentCard) {
          currentCard.style.transition = 'none';
        }
      }, { passive: true });

      card.addEventListener('touchmove', (e) => {
        if (!e.touches || e.touches.length !== 1 || isAnimating) return;

        const t = e.touches[0];
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;

        if (Math.abs(dx) > 10) moved = true;

        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 18) {
          touchCurrentX = t.clientX;
          dragDX = dx;

          if (currentCard) {
            currentCard.style.transition = 'none';
            currentCard.style.transform = flipped
              ? `translateX(${dx}px) rotateY(180deg)`
              : `translateX(${dx}px)`;
          }
        }
      }, { passive: true });

      card.addEventListener('touchend', () => {
        if (isAnimating) return;

        const dx = touchCurrentX - touchStartX;

        if (Math.abs(dragDX) > 70) {
          resetDragVisual();

          if (dx < 0) {
            nextCard();
          } else {
            prevCard();
          }
          return;
        }

        resetDragVisual();
      });

      card.addEventListener('touchcancel', () => {
        resetDragVisual();
      });
    }

    prevZone.addEventListener('click', prevCard);
    nextZone.addEventListener('click', nextCard);

    document.addEventListener('keydown', (e) => {
      if (isAnimating) return;
      if (e.key === 'ArrowRight') nextCard();
      if (e.key === 'ArrowLeft') prevCard();
    });

    window.addEventListener('resize', () => {
      applyHeight(index);
    });

    renderInitial();
  </script>
</body>
</html>
