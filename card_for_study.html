<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>カード表示（HTML + Markdown対応）</title>

<!-- marked.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
  font-family:system-ui,"Noto Sans JP",sans-serif;
  background:#f5f7fb; padding:32px;
}
.card{
  max-width:720px; margin:auto;
  background:#fff; border:1px solid #ddd;
  border-radius:16px; padding:24px;
}
.title{font-size:1.6rem; margin-bottom:10px;}
.desc{margin-bottom:20px;}
.tags{display:flex; gap:10px; margin-bottom:16px;}
.tag-btn{
  border:1px solid #ccc; padding:8px 12px;
  border-radius:20px; cursor:pointer;
}
.tag-btn.active{background:#e8f0ff; font-weight:bold;}
.tag-panel{
  border:1px solid #cfe0ff;
  background:#f7fbff; padding:16px;
  border-radius:10px;
}
.tag-label{font-weight:bold; margin-bottom:8px;}
.tag-content p{margin:6px 0;}
</style>
</head>

<body>

<div class="card">
  <div class="title">「不動産物権変動（対抗要件・二重譲渡等）」の基礎知識</div>

  <div class="desc" id="desc"></div>

  <div class="tags">
    <button class="tag-btn active"
      data-label="重要概念"
      data-content="**対抗要件:** 既に成立している権利変動を第三者に主張するために必要な要件。不動産については登記（民法177条）。<br>**意思主義:** 物権変動は当事者の意思表示のみで効力を生じるという原則。日本民法が採用。<br>**公示の原則:** 物権変動を外部から認識可能にすることで、取引の安全を図る原則。<br>**第三者:** 当事者およびその包括承継人以外の者で、登記の欠缺を主張する正当な利益を有する者。<br>**二重譲渡:** 同一の不動産を複数の者に譲渡すること。先に登記を備えた者が優先する。">
      重要概念
    </button>

    <button class="tag-btn"
      data-label="重要判例"
      data-content="**最判昭33.6.14:** 民法177条の「第三者」は、当事者及びその包括承継人以外の者で、登記の欠缺を主張する正当な利益を有する者をいう。<br>**最判昭38.2.22:** 不動産の二重譲渡において、第二譲受人が第一譲渡の事実を知っていても、先に登記を備えれば所有権を取得する。<br>**最判昭43.8.2:** 取得時効完成後に登記を備えた者は、時効完成前の中間省略登記に対して優先する。">
      重要判例
    </button>

    <button class="tag-btn"
      data-label="学習のポイント"
      data-content="**意思主義と対抗要件の関係:** 当事者間では契約のみで物権変動が生じるが、第三者対抗には登記が必要という二段階構造を理解する。<br>**第三者の範囲:** 単に登記がないことを知っているだけでは第三者から除外されない。正当な利益の有無が重要。<br>**二重譲渡の処理:** 契約の先後ではなく、登記の先後で優劣が決まることを確実に押さえる。<br>**具体的事例への適用:** 転得者、抵当権者、差押債権者など、様々な第三者との関係で対抗要件の要否を判断できるようにする。">
      学習のポイント
    </button>
  </div>

  <div class="tag-panel">
    <div class="tag-label" id="label">タグ1</div>
    <div class="tag-content" id="content"></div>
  </div>
</div>

<script>
// 解説（Markdown）
const descMarkdown = `
不動産の物権変動は、当事者間では意思表示のみで効力を生じますが、第三者に対抗するには登記が必要です。ここでは、対抗要件制度の趣旨と具体的な適用について学びます。
`;

document.getElementById('desc').innerHTML = marked.parse(descMarkdown);

// タグ処理
const buttons = document.querySelectorAll('.tag-btn');
const label = document.getElementById('label');
const content = document.getElementById('content');

// 初期表示
content.innerHTML = marked.parse(buttons[0].dataset.content);

buttons.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    buttons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    label.textContent = btn.dataset.label;
    content.innerHTML = marked.parse(btn.dataset.content);
  });
});
</script>

</body>
</html>
